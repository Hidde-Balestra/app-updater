name: app_updater
description: "App Updater - apps installeren en updaten via GitHub Releases en F-Droid, buiten de Play Store om."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.5.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  open_filex: ^4.7.0
  package_info_plus: ^8.3.0
  path_provider: ^2.1.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/curated_apps.json
